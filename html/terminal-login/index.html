<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TradeForge • Redirecting Login</title>
  <meta name="robots" content="noindex,nofollow" />
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const next = (params.get("next") || "").trim();
      const safeNext = next.startsWith("/") && !next.startsWith("//") ? next : "";
      const target = safeNext ? `https://tradeforge.art/?login=1&next=${encodeURIComponent(safeNext)}` : "https://tradeforge.art/?login=1";
      window.location.replace(target);
    })();
  </script>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#06080b;
      color:#eef2f7;
      font:16px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    a{color:#d8b46b}
  </style>
</head>
<body>
  <p>Перенаправляем на единое окно входа. Если не сработало, нажми <a id="fallbackLink" href="/?login=1">сюда</a>.</p>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const next = (params.get("next") || "").trim();
      const safeNext = next.startsWith("/") && !next.startsWith("//") ? next : "";
      const target = safeNext ? `https://tradeforge.art/?login=1&next=${encodeURIComponent(safeNext)}` : "https://tradeforge.art/?login=1";
      const link = document.getElementById("fallbackLink");
      if (link) link.href = target;
    })();
  </script>
</body>
</html>
